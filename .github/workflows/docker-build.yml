name: Build and Push Docker Image

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual trigger
    inputs:
      push_image:
        description: 'Push the image to registry'
        required: false
        default: true
        type: boolean
      force_build:
        description: 'Force build even if no changes'
        required: false
        default: false
        type: boolean

env:
  SOURCE_REPO: bubbuild/bub
  DOCKERHUB_IMAGE: czyt/bub

permissions:
  contents: read
  packages: write

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      current_sha: ${{ steps.check.outputs.current_sha }}
      short_sha: ${{ steps.check.outputs.short_sha }}
      build_date: ${{ steps.check.outputs.build_date }}

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SOURCE_REPO }}
          fetch-depth: 1

      - name: Check for changes
        id: check
        run: |
          CURRENT_SHA=$(git rev-parse HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +'%Y%m%d')

          echo "current_sha=${CURRENT_SHA}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT

          # Check if force build is requested
          if [ "${{ github.event.inputs.force_build }}" = "true" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "::notice::Force build requested"
            exit 0
          fi

          # Check if this is a manual trigger
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "::notice::Manual build requested"
            exit 0
          fi

          # Fetch the current image manifest to check existing SHA tag on GHCR
          EXISTING_DIGEST=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://ghcr.io/v2/${{ github.repository_owner }}/bub/manifests/sha-${SHORT_SHA}" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" 2>/dev/null | jq -r '.config.digest' || echo "")

          if [ -z "$EXISTING_DIGEST" ] || [ "$EXISTING_DIGEST" = "null" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "::notice::New commits detected, build required"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "::notice::No new commits, skipping build"
          fi

  build-and-push:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SOURCE_REPO }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.check-changes.outputs.build_date }}
            type=raw,value=sha-${{ needs.check-changes.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=bub
            org.opencontainers.image.description=Bub it. Build it. A common shape for Agents.
            org.opencontainers.image.url=https://bub.build
            org.opencontainers.image.source=https://github.com/bubbuild/bub
            org.opencontainers.image.revision=${{ needs.check-changes.outputs.current_sha }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event.inputs.push_image != 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate summary
        run: |
          echo "## Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source Commit:** \`${{ needs.check-changes.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Date:** \`${{ needs.check-changes.outputs.build_date }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** \`linux/amd64\`, \`linux/arm64\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ env.DOCKERHUB_IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ needs.check-changes.outputs.build_date }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`sha-${{ needs.check-changes.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### GitHub Container Registry" >> $GITHUB_STEP_SUMMARY
          echo "\`ghcr.io/${{ github.repository }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ needs.check-changes.outputs.build_date }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`sha-${{ needs.check-changes.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY

  skip-notification:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Skip notification
        run: |
          echo "## Build Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No new commits detected since last build." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Current commit:** \`${{ needs.check-changes.outputs.short_sha }}\`" >> $GITHUB_STEP_SUMMARY