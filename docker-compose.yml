version: "3.9"

services:
  app:
    image: ${BUB_IMAGE:-czyt/bub:latest}
    container_name: bub
    hostname: bub

    env_file:
      - .env
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Asia/Shanghai}

    volumes:
      - ${BUB_WORKSPACE_PATH:-.}:/workspace
      - ${BUB_HOME:-${HOME}/.bub}:/data
      - ${BUB_AGENT_HOME:-${HOME}/.agents}:/root/.agents

    # Interactive container
    stdin_open: true
    tty: true

    # Restart policy
    restart: unless-stopped

    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: "${BUB_CPU_LIMIT:-2}"
          memory: ${BUB_MEMORY_LIMIT:-4G}
        reservations:
          cpus: "${BUB_CPU_RESERVATION:-0.5}"
          memory: ${BUB_MEMORY_RESERVATION:-512M}

    # Health check
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f bub || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "${BUB_LOG_MAX_SIZE:-10m}"
        max-file: "${BUB_LOG_MAX_FILES:-5}"

    # Network
    networks:
      - bub-network

    # Security options
    security_opt:
      - no-new-privileges:true

    # Labels for organization
    labels:
      - "com.bub.description=Bub AI Agent Runtime"
      - "com.bub.version=1.0.0"
      - "com.bub.maintainer=bub"

networks:
  bub-network:
    driver: bridge
    name: bub-network
    labels:
      - "com.bub.description=Bub internal network"